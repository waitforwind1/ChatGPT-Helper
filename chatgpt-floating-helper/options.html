<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChatGPT Helper 设置</title>
    <style>
      :root {
        color: #172033;
        background: #eef6ff;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        margin: 0;
        background:
          linear-gradient(135deg, rgba(24, 169, 153, 0.16), rgba(31, 122, 224, 0.14)),
          #f7fbff;
      }

      main {
        width: min(720px, calc(100vw - 32px));
        margin: 48px auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        letter-spacing: 0;
        color: #103f68;
      }

      p {
        margin: 0 0 24px;
        color: #637083;
        line-height: 1.65;
      }

      form {
        display: grid;
        gap: 16px;
        border: 1px solid rgba(31, 122, 224, 0.18);
        border-radius: 8px;
        background: linear-gradient(180deg, #ffffff, #f7fbff);
        padding: 22px;
        box-shadow: 0 18px 42px rgba(31, 122, 224, 0.12);
      }

      label {
        display: grid;
        gap: 7px;
        color: #253044;
        font-weight: 650;
      }

      input {
        height: 42px;
        border: 1px solid rgba(23, 32, 51, 0.16);
        border-radius: 7px;
        padding: 0 12px;
        color: #172033;
        font: inherit;
      }

      input:focus {
        border-color: #1f7ae0;
        box-shadow: 0 0 0 3px rgba(31, 122, 224, 0.14);
        outline: none;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 4px;
      }

      button {
        height: 38px;
        border: 1px solid rgba(31, 122, 224, 0.24);
        border-radius: 7px;
        padding: 0 14px;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
      }

      button[type="submit"] {
        background: linear-gradient(135deg, #18a999, #1f7ae0);
        color: #ffffff;
      }

      button[type="button"] {
        background: #e8f4ff;
        color: #1f6fd1;
      }

      #status {
        color: #126e61;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ChatGPT Helper</h1>
      <p>给柴犬配置 OpenAI-compatible API。插件只保存这些设置，不保存长期对话历史。</p>

      <form id="settings-form">
        <label>
          API Key
          <input id="apiKey" type="password" autocomplete="off" placeholder="sk-..." />
        </label>

        <label>
          Base URL
          <input id="baseUrl" type="url" placeholder="https://api.openai.com/v1" />
        </label>

        <label>
          Model
          <input id="model" type="text" placeholder="gpt-4.1-mini" />
        </label>

        <label>
          Temperature
          <input id="temperature" type="number" min="0" max="2" step="0.1" />
        </label>

        <div class="actions">
          <button type="submit">投放狗粮</button>
          <button id="reset" type="button">恢复默认</button>
          <span id="status" role="status"></span>
        </div>
      </form>
    </main>

    <script src="src/options.js"></script>
  </body>
</html>
