<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChatGPT Helper</title>
    <style>
      :root {
        color: #172033;
        background: #f7fbff;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        width: 320px;
        margin: 0;
        background: #f7fbff;
      }

      main {
        padding: 16px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 17px;
        letter-spacing: 0;
        color: #103f68;
      }

      p {
        margin: 0;
        color: #637083;
        line-height: 1.55;
      }

      .status {
        margin: 14px 0;
        border: 1px solid rgba(31, 122, 224, 0.14);
        border-radius: 8px;
        background: #ffffff;
        padding: 11px;
      }

      .status strong {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
      }

      .status span {
        color: #126e61;
        font-size: 13px;
      }

      .actions {
        display: grid;
        gap: 8px;
      }

      button {
        height: 38px;
        border: 1px solid rgba(31, 122, 224, 0.24);
        border-radius: 7px;
        background: linear-gradient(135deg, #18a999, #1f7ae0);
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
      }

      button.secondary {
        background: #e8f4ff;
        color: #1f6fd1;
      }

      .note {
        margin-top: 12px;
        color: #6b7280;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ChatGPT Helper</h1>
      <p>柴犬sensei在线答疑</p>

      <div class="status">
        <strong>狗粮配置</strong>
        <span id="api-status">柴犬sensei检查ing...</span>
      </div>

      <div class="actions">
        <button id="open-chatgpt" type="button">导航到ChatGPT</button>
        <button id="open-options" class="secondary" type="button">喂一下 API Key</button>
      </div>

      <p class="note">进入 ChatGPT 页面后，右下角会出现柴犬按钮；按住柴犬或面板标题栏即可拖动位置。</p>
    </main>

    <script src="src/popup.js"></script>
  </body>
</html>
